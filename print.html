<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poolbar Karte — Druck</title>
  <link rel="stylesheet" href="assets/karte.css?v=24">
  <style>
    body { background: #fff; margin: 0; }
    .a4-viewport { padding: 0; min-height: auto; }
    .a4-sheet,
    .a4-page {
      width: var(--page-width);
      height: var(--page-height);
    }
    .a4-sheet { box-shadow: none; aspect-ratio: auto; display: block; }
    .a4-page { transform: none !important; }
    .a4-inner { padding: var(--page-margin); box-sizing: border-box; }
  </style>
</head>
<body>
  <div class="a4-viewport">
    <div class="a4-sheet">
      <div class="a4-page">
        <div class="a4-inner" id="karte-root"></div>
      </div>
    </div>
  </div>
  <script type="module">
    import { renderKarte, loadMenu } from './assets/karte.js';

    const params = new URLSearchParams(location.search);
    const autoPrint = params.get('print') === '1';

    async function getMenu() {
      if (params.get('preview') === '1') {
        const raw = sessionStorage.getItem('poolbar-print-menu');
        if (raw) return JSON.parse(raw);
      }
      return loadMenu('data/menu.json');
    }

    getMenu().then((menu) => {
      renderKarte(menu, document.getElementById('karte-root'));
      Promise.all([
        document.fonts.ready,
        new Promise((resolve) => requestAnimationFrame(() => requestAnimationFrame(resolve))),
      ]).then(() => {
        document.body.dataset.ready = '1';
        if (autoPrint) window.print();
      });
    });
  </script>
</body>
</html>
