<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poolbar Festival 2026 — Getränkekarte</title>
  <link rel="stylesheet" href="assets/karte.css">
</head>
<body>
  <div class="a4-viewport">
    <div class="a4-sheet" id="karte-root"></div>
    <p class="screen-hint">Für Druck und exakte Darstellung: PDF herunterladen. Pinch-Zoom für Details auf dem Handy.</p>
  </div>
  <div class="download-bar">
    <a class="download-btn" href="poolbar_getraenkekarte_2026.pdf" download>PDF herunterladen</a>
  </div>
  <script type="module">
    import { renderKarte, loadMenu } from './assets/karte.js';
    const root = document.getElementById('karte-root');
    loadMenu('data/menu.json').then((menu) => renderKarte(menu, root));
  </script>
</body>
</html>
