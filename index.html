<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poolbar Festival 2026 — Getränkekarte</title>
  <link rel="stylesheet" href="assets/karte.css?v=24">
</head>
<body>
  <div class="a4-viewport">
    <div class="a4-sheet">
      <div class="a4-page">
        <div class="a4-inner" id="karte-root"></div>
      </div>
    </div>
    <p class="screen-hint">Vorschau A4 quer (1 cm Rand). Für Druck: PDF herunterladen.</p>
  </div>
  <div class="download-bar">
    <a class="download-btn" id="pdf-download" href="poolbar_getraenkekarte_2026.pdf" download="poolbar_getraenkekarte_2026.pdf">PDF herunterladen</a>
  </div>
  <script type="module">
    import { renderKarte, loadMenu } from './assets/karte.js';
    const root = document.getElementById('karte-root');
    const link = document.getElementById('pdf-download');
    loadMenu('data/menu.json').then((menu) => {
      renderKarte(menu, root);
      if (link && menu.meta?.updated) {
        link.href = `poolbar_getraenkekarte_2026.pdf?v=${menu.meta.updated}`;
      }
    }).catch(() => {
      if (link) link.textContent = 'PDF vorübergehend nicht verfügbar';
    });
  </script>
</body>
</html>
